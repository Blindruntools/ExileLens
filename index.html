<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exile's Lens — PoE2 Item Scanner</title>
  <style>
    :root {
      --bg-deep: #0d0d0f;
      --bg-panel: #16161a;
      --border-glow: #2a2a35;
      --text-main: #e2e2e9;
      --text-muted: #8a8a9d;
      --gold: #dfb15b;
      --gold-hover: #fcd98c;
      --red-accent: #e54e4e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-deep);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 24px;
    }

    .app-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      color: var(--gold);
      font-size: 2.2rem;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    header p {
      color: var(--text-muted);
    }

    /* Tabs */
    .type-selector-group {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .type-tab {
      background: var(--bg-panel);
      border: 1px solid var(--border-glow);
      color: var(--text-muted);
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s ease;
    }

    .type-tab:hover {
      border-color: var(--gold);
      color: var(--text-main);
    }

    .type-tab.active {
      background: rgba(223, 177, 91, 0.1);
      border-color: var(--gold);
      color: var(--gold);
    }

    /* Comparison Workspaces */
    .workspace-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }

    .item-panel {
      background: var(--bg-panel);
      border: 1px solid var(--border-glow);
      border-radius: 6px;
      padding: 20px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-glow);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .panel-header h2 {
      font-size: 1.2rem;
      color: var(--text-main);
    }

    .clear-btn {
      background: transparent;
      border: none;
      color: var(--red-accent);
      cursor: pointer;
      font-weight: 600;
    }

    /* OCR Inputs */
    .scan-zone {
      background: rgba(0, 0, 0, 0.2);
      border: 2px dashed var(--border-glow);
      padding: 16px;
      text-align: center;
      border-radius: 4px;
      margin-bottom: 20px;
    }

    .scan-trigger-btn {
      background: var(--gold);
      color: #000;
      border: none;
      padding: 8px 16px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 8px;
    }

    .scan-trigger-btn:hover { background: var(--gold-hover); }
    .item-image-input { display: none; }
    .status-indicator { font-size: 0.85rem; color: var(--text-muted); }

    /* Dynamic Affix Modifier Layout Rows */
    .attribute-category-group {
      margin-bottom: 20px;
    }

    .category-group-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gold);
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .attribute-menu-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }

    .attribute-menu-row label {
      font-size: 0.9rem;
      color: var(--text-main);
    }

    .row-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ctrl-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-glow);
      color: var(--text-main);
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 1rem;
      border-radius: 3px;
    }

    .ctrl-btn:hover { background: rgba(255, 255, 255, 0.15); }

    .row-controls input {
      background: #000;
      border: 1px solid var(--border-glow);
      color: var(--gold);
      width: 54px;
      height: 28px;
      text-align: center;
      font-weight: bold;
      border-radius: 3px;
    }

    /* Call to Action Controls */
    .action-container {
      text-align: center;
      margin-bottom: 32px;
    }

    .compare-btn {
      background: var(--gold);
      color: #000;
      border: none;
      padding: 16px 48px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(223, 177, 91, 0.2);
    }

    .compare-btn:hover { background: var(--gold-hover); }

    /* Evaluation Output Modules */
    .results-section {
      background: var(--bg-panel);
      border: 1px solid var(--gold);
      border-radius: 6px;
      padding: 24px;
      display: none;
    }

    .results-section.visible { display: block; }

    .verdict-banner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-left: 16px;
      margin-bottom: 20px;
    }

    .verdict-label { font-size: 1.2rem; font-weight: bold; color: var(--gold); }
    .verdict-desc { font-size: 0.9rem; color: var(--text-muted); margin-top: 4px; }
    .verdict-diff { text-align: right; }
    
    .diff-pct { font-size: 1.8rem; font-weight: bold; }
    .diff-pct.positive { color: #4ee572; }
    .diff-pct.negative { color: var(--red-accent); }
    .diff-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }

    .stat-breakdown {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.2);
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 0.95rem;
    }

    .breakdown-stat { color: var(--text-main); }
    .breakdown-val { font-family: monospace; color: var(--gold); }
  </style>
  <!-- Load standard Tesseract engine resource -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>EXILE'S LENS</h1>
      <p>Precision Item Affix Evaluation & Comparison Matrix for Path of Exile 2</p>
    </header>

    <!-- Category Selector Navigation -->
    <div class="type-selector-group">
      <button type="button" class="type-tab active" data-type="weapons">Weapons</button>
      <button type="button" class="type-tab" data-type="armor">Armor</button>
      <button type="button" class="type-tab" data-type="rings">Rings</button>
      <button type="button" class="type-tab" data-type="amulet">Amulet</button>
    </div>

    <!-- Layout Columns -->
    <div class="workspace-grid">
      <!-- Item Node Left -->
      <div class="item-panel" id="panelA">
        <div class="panel-header">
          <h2>Item Slot A</h2>
          <button type="button" class="clear-btn" id="clearA">Reset</button>
        </div>
        <div class="scan-zone">
          <div class="status-indicator">READY FOR CAPTURE</div>
          <button type="button" class="scan-trigger-btn" data-target="itemAFile">SCAN IMAGE</button>
          <input type="file" id="itemAFile" class="item-image-input" accept="image/*" />
        </div>
        <div id="menuA"></div>
      </div>

      <!-- Item Node Right -->
      <div class="item-panel" id="panelB">
        <div class="panel-header">
          <h2>Item Slot B</h2>
          <button type="button" class="clear-btn" id="clearB">Reset</button>
        </div>
        <div class="scan-zone">
          <div class="status-indicator">READY FOR CAPTURE</div>
          <button type="button" class="scan-trigger-btn" data-target="itemBFile">SCAN IMAGE</button>
          <input type="file" id="itemBFile" class="item-image-input" accept="image/*" />
        </div>
        <div id="menuB"></div>
      </div>
    </div>

    <div class="action-container">
      <button type="button" class="compare-btn" id="compareBtn">RUN COMPARISON ENGINE</button>
    </div>

    <!-- Comparative Analysis Output Panel -->
    <div class="results-section" id="resultsSection">
      <div id="resultsInner"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
