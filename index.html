<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exile's Lens — High-Precision Local Scanner</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght=0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

  <div class="vignette" aria-hidden="true"></div>

  <div class="container">
    <header class="site-header">
      <div class="header-text">
        <p class="header-eyebrow">Path of Exile 2</p>
        <h1>Exile's Lens</h1>
        <p class="header-sub">High-Contrast Client-Side Processor</p>
      </div>
    </header>

    <!-- BUILD METRIC PROFILES -->
    <section class="section build-section">
      <label class="section-label" for="buildInput">
        <span class="label-icon">📜</span> Active Build Archetype
      </label>
      <input type="text" id="buildInput" placeholder="e.g., Lightning Monk, Spirit Druid, Evasion Huntress..." spellcheck="false" />
    </section>

    <!-- MATRIX MOD GRID -->
    <section class="items-grid">

      <!-- CURRENT GEAR -->
      <div class="item-panel" id="panelA">
        <div class="panel-header">
          <div class="panel-text-block">
            <div class="panel-title">Current Item</div>
            <div class="panel-sub">Equipped Item Modifiers</div>
          </div>
          <div class="panel-actions">
            <button type="button" class="action-btn scan-trigger-btn" data-target="itemA-file">📸 SCAN IMAGE</button>
            <input type="file" id="itemA-file" class="item-image-input" accept="image/*" style="display: none;" />
            <button type="button" class="action-btn clear-btn" id="clearA">RESET</button>
          </div>
        </div>
        <div class="attribute-menu-container" id="menuA"></div>
      </div>

      <div class="vs-divider" aria-hidden="true">
        <div class="vs-line"></div>
        <div class="vs-circle">VS</div>
        <div class="vs-line"></div>
      </div>

      <!-- MARKET ITEM -->
      <div class="item-panel" id="panelB">
        <div class="panel-header">
          <div class="panel-text-block">
            <div class="panel-title">Market Target</div>
            <div class="panel-sub">Target Item Modifiers</div>
          </div>
          <div class="panel-actions">
            <button type="button" class="action-btn scan-trigger-btn" data-target="itemB-file">📸 SCAN IMAGE</button>
            <input type="file" id="itemB-file" class="item-image-input" accept="image/*" style="display: none;" />
            <button type="button" class="action-btn clear-btn" id="clearB">RESET</button>
          </div>
        </div>
        <div class="attribute-menu-container" id="menuB"></div>
      </div>

    </section>

    <div class="compare-row">
      <button class="compare-btn" id="compareBtn">◆ Weigh Affix Weight ◆</button>
    </div>

    <section class="results-section" id="resultsSection">
      <div class="results-inner" id="resultsInner"></div>
    </section>
  </div>

  <!-- Include Tesseract CDN for local execution -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
